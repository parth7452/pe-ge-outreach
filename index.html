<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PE / GE Outreach Pipeline</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f5f7;
    --card-bg: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b70;
    --border: #e2e2e5;
    --accent: #3d5afe;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #131316;
      --card-bg: #1c1c20;
      --text: #ececee;
      --muted: #9a9aa2;
      --border: #2c2c31;
      --accent: #7c93ff;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    padding-bottom: 48px;
  }
  h1 { font-size: 1.3rem; margin: 4px 0 2px; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
  .summary {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    margin-bottom: 20px;
    -webkit-overflow-scrolling: touch;
  }
  .stat {
    flex: 0 0 auto;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    min-width: 84px;
    text-align: center;
  }
  .stat .n { font-size: 1.3rem; font-weight: 600; display: block; }
  .stat .l { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; }
  .group { margin-bottom: 24px; }
  .group h2 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin: 0 0 8px 4px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
  }
  .firm { font-weight: 600; font-size: 1rem; }
  .alum { font-size: 0.75rem; color: var(--accent); white-space: nowrap; }
  .person { font-size: 0.85rem; color: var(--text); margin: 6px 0; line-height: 1.35; }
  .meta { font-size: 0.78rem; color: var(--muted); }
  .meta b { color: var(--text); font-weight: 500; }
  .tag {
    display: inline-block;
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--accent);
    margin-top: 8px;
  }
  .empty { color: var(--muted); font-size: 0.85rem; padding: 12px 4px; }
  .updated { color: var(--muted); font-size: 0.72rem; text-align: center; margin-top: 24px; }
</style>
</head>
<body>
<h1>PE / Growth Equity Outreach Pipeline</h1>
<div class="subtitle">Full-time recruiting networking</div>
<div class="summary" id="summary"></div>
<div id="groups"></div>
<div class="updated" id="updated"></div>

<script>
const STATUS_ORDER = ["call_scheduled", "replied", "sent", "drafted", "researched", "passed"];
const STATUS_LABELS = {
  call_scheduled: "Call scheduled",
  replied: "Replied",
  sent: "Sent",
  drafted: "Drafted",
  researched: "Researched",
  passed: "Passed"
};

fetch('data/targets.json?v=' + Date.now(), { cache: 'no-store' })
  .then(r => r.json())
  .then(render)
  .catch(err => {
    document.getElementById('groups').innerHTML =
      '<div class="empty">Could not load data/targets.json (' + err.message + ')</div>';
  });

function render(data) {
  const targets = data.targets || [];
  const byStatus = {};
  for (const t of targets) {
    (byStatus[t.status] = byStatus[t.status] || []).push(t);
  }

  const summaryEl = document.getElementById('summary');
  summaryEl.innerHTML = STATUS_ORDER
    .filter(s => byStatus[s] && byStatus[s].length)
    .map(s => `<div class="stat"><span class="n">${byStatus[s].length}</span><span class="l">${STATUS_LABELS[s]}</span></div>`)
    .join('') || '<div class="empty">No targets yet</div>';

  const groupsEl = document.getElementById('groups');
  groupsEl.innerHTML = STATUS_ORDER
    .filter(s => byStatus[s] && byStatus[s].length)
    .map(s => `
      <div class="group">
        <h2>${STATUS_LABELS[s]} (${byStatus[s].length})</h2>
        ${byStatus[s].map(cardHtml).join('')}
      </div>
    `).join('');

  document.getElementById('updated').textContent =
    'Data as of latest pipeline run · ' + targets.length + ' total targets';
}

function cardHtml(t) {
  const person = t.person || {};
  return `
    <div class="card">
      <div class="card-top">
        <span class="firm">${escapeHtml(t.firm)}</span>
        <span class="alum">${t.ut_austin_alum === true ? 'UT alum' : ''}</span>
      </div>
      <div class="person"><b>${escapeHtml(person.name || 'Contact TBD')}</b>${person.title ? ' — ' + escapeHtml(person.title) : ''}</div>
      <div class="meta">${escapeHtml(t.how_sourced || '')}</div>
      <span class="tag">${escapeHtml(t.outreach_channel || '')}</span>
    </div>
  `;
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
</script>
</body>
</html>
